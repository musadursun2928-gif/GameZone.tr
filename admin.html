<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 GAMEZONE — Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

        /* Header */
        .admin-header {
            background: rgba(10,10,15,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 16px 0;
            display: flex; align-items: center; justify-content: center;
        }
        .admin-header .container {
            display: flex; align-items: center; justify-content: space-between; width: 100%;
        }
        .admin-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem; font-weight: 900;
            color: #00e5ff; letter-spacing: 2px;
        }
        .admin-logo span { color: #ff2d7b; }
        .btn-back {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem; font-weight: 600;
            letter-spacing: 2px; color: #8892a4;
            background: none; border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 18px; border-radius: 4px;
            cursor: pointer; text-decoration: none;
            transition: all 0.3s;
        }
        .btn-back:hover { border-color: #00e5ff; color: #00e5ff; }

        /* Page Title */
        .page-title {
            text-align: center; padding: 40px 0 32px;
        }
        .page-title h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem; font-weight: 900;
            color: #fff; margin-bottom: 8px;
        }
        .page-title p { font-size: 0.85rem; color: #8892a4; }

        /* Add Game Form */
        .add-section {
            background: #12121f;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 32px;
        }
        .add-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; font-weight: 700;
            letter-spacing: 2px; color: #00e5ff;
            margin-bottom: 20px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px; margin-bottom: 16px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label {
            font-size: 0.75rem; font-weight: 600;
            color: #8892a4; margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            padding: 11px 14px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #fff; font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none; transition: border 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #00e5ff;
        }
        .btn-add {
            width: 100%; padding: 13px;
            border: none; border-radius: 6px;
            background: #00e5ff; color: #0a0a0f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem; font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer; transition: opacity 0.3s;
            margin-top: 8px;
        }
        .btn-add:hover { opacity: 0.85; }
        .form-status {
            text-align: center; margin-top: 12px;
            font-size: 0.85rem;
        }
        .form-status.success { color: #34d399; }
        .form-status.error { color: #f87171; }

        /* Games List */
        .list-section {
            margin-bottom: 60px;
        }
        .list-section h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; font-weight: 700;
            letter-spacing: 2px; color: #ff2d7b;
            margin-bottom: 16px;
        }
        .game-count {
            font-size: 0.75rem; color: #8892a4;
            margin-bottom: 16px; display: block;
        }
        .game-list { display: flex; flex-direction: column; gap: 10px; }
        .game-item {
            display: flex; align-items: center; justify-content: space-between;
            background: #12121f;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 14px 18px;
            transition: border-color 0.3s;
        }
        .game-item:hover { border-color: rgba(255,255,255,0.12); }
        .game-item-info { display: flex; align-items: center; gap: 14px; flex: 1; }
        .game-item-emoji { font-size: 1.5rem; }
        .game-item-name {
            font-weight: 600; font-size: 0.9rem;
        }
        .game-item-cat {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            padding: 3px 8px; border-radius: 4px;
            background: rgba(0,229,255,0.1); color: #00e5ff;
            margin-left: 10px;
        }
        .game-item-url {
            font-size: 0.7rem; color: #4a5568;
            max-width: 200px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .btn-delete {
            background: none; border: 1px solid rgba(255,45,123,0.3);
            color: #ff2d7b; padding: 7px 16px;
            border-radius: 6px; cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem; font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-delete:hover {
            background: #ff2d7b; color: #fff;
            border-color: #ff2d7b;
        }
        .empty-list {
            text-align: center; padding: 40px;
            color: #4a5568; font-size: 0.9rem;
            background: #12121f;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .game-item { flex-direction: column; gap: 10px; align-items: flex-start; }
            .btn-delete { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<header class="admin-header">
    <div class="container">
        <div class="admin-logo">🎮 GAMEZONE <span>ADMİN</span></div>
        <a href="index.html" class="btn-back">← SİTEYE DÖN</a>
    </div>
</header>

<div class="container">
    <div class="page-title">
        <h1>Admin Panel</h1>
        <p>Oyun ekle, düzenle veya kaldır</p>
    </div>

    <!-- Add Game -->
    <div class="add-section">
        <h2>➕ YENİ OYUN EKLE</h2>
        <form id="addForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Oyun Adı</label>
                    <input type="text" id="gameName" required placeholder="Örn: Süper Macera">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="gameCategory">
                        <option value="aksiyon">Aksiyon</option>
                        <option value="bulmaca">Bulmaca</option>
                        <option value="yarış">Yarış</option>
                        <option value="spor">Spor</option>
                        <option value="strateji">Strateji</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group full">
                    <label>Oyun URL (link)</label>
                    <input type="url" id="gameUrl" required placeholder="https://ornek.com/oyun">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group full">
                    <label>Kapak Resmi URL (opsiyonel)</label>
                    <input type="url" id="gameImage" placeholder="https://ornek.com/resim.jpg">
                </div>
            </div>
            <button type="submit" class="btn-add">OYUN EKLE</button>
            <div class="form-status" id="formStatus"></div>
        </form>
    </div>

    <!-- Games List -->
    <div class="list-section">
        <h2>📋 MEVCUT OYUNLAR</h2>
        <span class="game-count" id="gameCount"></span>
        <div class="game-list" id="gameList"></div>
    </div>
</div>

<script>
let games = [];

function init() {
    loadGames();
    renderList();
    document.getElementById("addForm").addEventListener("submit", addGame);
}

function loadGames() {
    const stored = localStorage.getItem("gamezone_games");
    games = stored ? JSON.parse(stored) : [];
}

function saveGames() {
    localStorage.setItem("gamezone_games", JSON.stringify(games));
}

function renderList() {
    const list = document.getElementById("gameList");
    const count = document.getElementById("gameCount");
    count.textContent = games.length + " oyun mevcut";

    if (games.length === 0) {
        list.innerHTML = '<div class="empty-list">Henüz oyun eklenmedi.</div>';
        return;
    }

    list.innerHTML = games.map(g => `
        <div class="game-item">
            <div class="game-item-info">
                <span class="game-item-emoji">${g.emoji || "🎮"}</span>
                <div>
                    <span class="game-item-name">${g.name}</span>
                    <span class="game-item-cat">${g.category}</span>
                    <div class="game-item-url">${g.url}</div>
                </div>
            </div>
            <button class="btn-delete" onclick="deleteGame(${g.id})">SİL</button>
        </div>
    `).join("");
}

function addGame(e) {
    e.preventDefault();
    const status = document.getElementById("formStatus");
    const name = document.getElementById("gameName").value.trim();
    const category = document.getElementById("gameCategory").value;
    const url = document.getElementById("gameUrl").value.trim();
    const image = document.getElementById("gameImage").value.trim();

    if (!name || !url) return;

    const emojiMap = { aksiyon: "💥", bulmaca: "🧩", yarış: "🏎️", spor: "⚽", strateji: "🏰" };

    const newGame = {
        id: Date.now(),
        name: name,
        category: category,
        emoji: emojiMap[category] || "🎮",
        url: url,
        plays: 0,
        image: image || null
    };

    games.unshift(newGame);
    saveGames();
    renderList();

    document.getElementById("addForm").reset();
    status.textContent = "✅ " + name + " eklendi!";
    status.className = "form-status success";
    setTimeout(() => { status.textContent = ""; }, 3000);
}

function deleteGame(id) {
    const game = games.find(g => g.id === id);
    if (!game) return;
    if (!confirm(game.name + " silinsin mi?")) return;

    games = games.filter(g => g.id !== id);
    saveGames();
    renderList();
}

document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
