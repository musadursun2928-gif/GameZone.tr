<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Zone - Neon Oyun İndirme Sitesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- TEMEL AYARLAR --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #05050a;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 243, 255, 0.15), transparent 40%);
            z-index: -1;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(188, 19, 254, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            letter-spacing: 2px;
        }
        .logo span { color: #bc13fe; text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe; }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 18px;
            font-weight: 600;
            transition: 0.3s;
        }
        nav a:hover { color: #00f3ff; text-shadow: 0 0 8px #00f3ff; }

        /* --- ANA İÇERİK --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 20px;
            color: #fff;
            border-left: 4px solid #bc13fe;
            padding-left: 15px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
        }

        /* --- OYUN EKLEME FORMU --- */
        .admin-panel {
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 50px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: span 2; }
        label { margin-bottom: 8px; font-size: 16px; color: #00f3ff; }
        input, textarea {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #bc13fe;
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.3);
        }
        .btn-add {
            grid-column: span 2;
            background: linear-gradient(45deg, #00f3ff, #bc13fe);
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        /* --- OYUN KARTLARI --- */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .game-card {
            background: rgba(20, 20, 35, 0.6);
            border: 1px solid rgba(188, 19, 254, 0.2);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #00f3ff;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
        }
        .game-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .game-info { padding: 20px; }
        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            margin-bottom: 10px;
            color: #fff;
        }
        .game-desc {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 20px;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }
        .btn-download {
            display: block;
            width: 100%;
            text-align: center;
            background: transparent;
            border: 1px solid #00f3ff;
            color: #00f3ff;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .btn-download:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 15px #00f3ff;
        }
        .btn-delete {
            display: block;
            width: 100%;
            text-align: center;
            background: transparent;
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
        }
        .btn-delete:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 15px #ff0055;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GAME <span>ZONE</span></div>
        <nav>
            <a href="#">Ana Sayfa</a>
            <a href="#">Oyunlar</a>
            <a href="#">Hakkında</a>
            <a href="#">İletişim</a>
        </nav>
    </header>

    <div class="container">
        <!-- Oyun Ekleme Paneli -->
        <h2 class="section-title">Yönetici Paneli - Oyun Ekle</h2>
        <div class="admin-panel">
            <form id="addGameForm" class="form-grid">
                <div class="form-group">
                    <label>Oyun Adı</label>
                    <input type="text" id="gameName" required placeholder="Örn: Cyberpunk 2077">
                </div>
                <div class="form-group">
                    <label>Kapak Görsel URL</label>
                    <input type="url" id="gameImage" required placeholder="https://...">
                </div>
                <div class="form-group full">
                    <label>Kısa Açıklama</label>
                    <textarea id="gameDesc" rows="2" required placeholder="Oyun hakkında kısa bilgi..."></textarea>
                </div>
                <div class="form-group full">
                    <label>İndirme Linki</label>
                    <input type="url" id="gameLink" required placeholder="https://...">
                </div>
                <button type="submit" class="btn-add">Oyunu Ekle</button>
            </form>
        </div>

        <!-- Oyun Listesi -->
        <h2 class="section-title">Popüler Oyunlar</h2>
        <div class="games-grid" id="gamesGrid">
            <!-- Oyunlar buraya JavaScript ile eklenecek -->
        </div>
    </div>

    <script>
        // Sayfa yüklendiğinde oyunları getir
        document.addEventListener('DOMContentLoaded', loadGames);

        const form = document.getElementById('addGameForm');
        const gamesGrid = document.getElementById('gamesGrid');

        // Oyun Ekleme İşlemi
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newGame = {
                id: Date.now(),
                name: document.getElementById('gameName').value,
                image: document.getElementById('gameImage').value,
                desc: document.getElementById('gameDesc').value,
                link: document.getElementById('gameLink').value
            };

            let games = JSON.parse(localStorage.getItem('gameZoneGames')) || [];
            games.push(newGame);
            localStorage.setItem('gameZoneGames', JSON.stringify(games));
            
            form.reset();
            loadGames();
        });

        // Oyunları Listeleme
        function loadGames() {
            let games = JSON.parse(localStorage.getItem('gameZoneGames')) || [];
            gamesGrid.innerHTML = '';

            if (games.length === 0) {
                gamesGrid.innerHTML = '<p style="color:#aaa; grid-column:span 3;">Henüz eklenmiş oyun yok. Yukarıdan ilk oyununu ekle!</p>';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <img src="${game.image}" alt="${game.name}" class="game-img" onerror="this.src='https://via.placeholder.com/300x180/05050a/00f3ff?text=Game+Zone'">
                    <div class="game-info">
                        <h3 class="game-title">${game.name}</h3>
                        <p class="game-desc">${game.desc}</p>
                        <a href="${game.link}" target="_blank" class="btn-download">İNDİR</a>
                        <button class="btn-delete" onclick="deleteGame(${game.id})">Oyunu Sil</button>
                    </div>
                `;
                gamesGrid.appendChild(card);
            });
        }

        // Oyun Silme İşlemi
        function deleteGame(id) {
            if(confirm('Bu oyunu silmek istediğinize emin misiniz?')) {
                let games = JSON.parse(localStorage.getItem('gameZoneGames')) || [];
                games = games.filter(game => game.id !== id);
                localStorage.setItem('gameZoneGames', JSON.stringify(games));
                loadGames();
            }
        }
    </script>
</body>
</html>
