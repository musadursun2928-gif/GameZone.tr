<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GAME - Premium Oyun İndirme Platformu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0a0a0a, #1a0b2e, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Header & Logo */
        header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        .logo-container {
            display: inline-block;
            position: relative;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            animation: logoGlow 3s ease-in-out infinite alternate;
            position: relative;
        }

        .logo::before {
            content: 'NEXUS GAME';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes logoGlow {
            from { filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.8)); }
            to { filter: drop-shadow(0 0 40px rgba(188, 19, 254, 0.8)); }
        }

        .tagline {
            margin-top: 10px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 5px;
        }

        /* Character Containers */
        .character-container {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            height: 600px;
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }

        .character-left {
            left: 0;
            background: linear-gradient(90deg, rgba(0, 243, 255, 0.1), transparent);
        }

        .character-right {
            right: 0;
            background: linear-gradient(-90deg, rgba(188, 19, 254, 0.1), transparent);
        }

        .character-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px currentColor);
        }

        .character-left .character-img {
            color: var(--neon-blue);
        }

        .character-right .character-img {
            color: var(--neon-purple);
        }

        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* Admin Button */
        .admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .admin-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* Games Grid */
        .games-section {
            margin-top: 60px;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .game-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            cursor: pointer;
            position: relative;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 10px 40px rgba(0, 243, 255, 0.3);
        }

        .game-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 2px solid var(--neon-blue);
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .game-description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.3);
            animation: modalAppear 0.3s ease;
        }

        @keyframes modalAppear {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--neon-pink);
            transition: 0.3s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
            color: #fff;
        }

        .modal-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--neon-blue);
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid var(--neon-purple);
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            background: var(--glass-bg);
            border: 2px solid var(--neon-pink);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .admin-panel.active {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .submit-btn {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.4);
        }

        /* Support Section */
        .support-section {
            margin-top: 60px;
            padding: 40px;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .support-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--neon-purple);
        }

        .support-email {
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-decoration: none;
            display: inline-block;
            padding: 15px 30px;
            border: 2px solid var(--neon-blue);
            border-radius: 30px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .support-email:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .character-container {
                display: none;
            }
            
            .logo {
                font-size: 2.5rem;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading Animation */
        .loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3000;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 243, 255, 0.3);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: #fff;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 10;
        }

        .delete-btn:hover {
            background: #ff0000;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Character Images -->
    <div class="character-container character-left">
        <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Zed_0.jpg" alt="Zed" class="character-img">
    </div>

    <div class="character-container character-right">
        <img src="https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt136e4b4d4b7a9c7f/605e49e3a6a6e728c6c6d5e3/VALORANT_Raze_Art.jpg" alt="Raze" class="character-img">
    </div>

    <!-- Admin Button -->
    <button class="admin-btn" onclick="toggleAdmin()">⚙️ Admin Panel</button>

    <!-- Header -->
    <header>
        <div class="logo-container">
            <h1 class="logo">NEXUS GAME</h1>
            <p class="tagline">PREMIUM OYUN İNDİRME PLATFORMU</p>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel">
            <h2 style="color: var(--neon-pink); margin-bottom: 30px; text-align: center;">🎮 Yeni Oyun Ekle</h2>
            <form id="gameForm">
                <div class="form-group">
                    <label>Oyun Adı</label>
                    <input type="text" id="gameName" required placeholder="Örn: Cyberpunk 2077">
                </div>
                <div class="form-group">
                    <label>Oyun Resmi URL</label>
                    <input type="url" id="gameImage" required placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>İndirme Linki</label>
                    <input type="url" id="downloadLink" required placeholder="https://example.com/download">
                </div>
                <div class="form-group">
                    <label>Açıklama</label>
                    <textarea id="gameDesc" rows="3" required placeholder="Oyun hakkında kısa açıklama..."></textarea>
                </div>
                <button type="submit" class="submit-btn">🚀 Oyunu Ekle</button>
            </form>
        </div>

        <!-- Games Section -->
        <section class="games-section">
            <h2 class="section-title">🎯 POPÜLER OYUNLAR</h2>
            <div class="games-grid" id="gamesGrid">
                <!-- Games will be loaded here -->
            </div>
        </section>

        <!-- Support Section -->
        <section class="support-section">
            <h2 class="support-title">📧 DESTEK HATTI</h2>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">Herhangi bir sorun mu yaşadınız? Bize ulaşın!</p>
            <a href="mailto:destek@nexusgame.com" class="support-email">destek@nexusgame.com</a>
        </section>
    </div>

    <!-- Game Detail Modal -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <img src="" alt="" class="modal-image" id="modalImage">
            <p id="modalDesc" style="color: rgba(255,255,255,0.8); line-height: 1.6;"></p>
            <button class="download-btn" id="downloadBtn">
                ⬇️ İNDİR
            </button>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <script>
        // Games data storage
        let games = JSON.parse(localStorage.getItem('nexusGames')) || [];

        // Admin password
        const ADMIN_PASSWORD = 'admin123';
        let isAdmin = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadGames();
            
            // Form submit
            document.getElementById('gameForm').addEventListener('submit', (e) => {
                e.preventDefault();
                addGame();
            });
        });

        // Toggle Admin Panel
        function toggleAdmin() {
            if (!isAdmin) {
                const password = prompt('Admin şifresini girin:');
                if (password === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById('adminPanel').classList.add('active');
                    document.querySelector('.admin-btn').textContent = '❌ Çıkış Yap';
                    loadGames(); // Reload to show delete buttons
                } else if (password !== null) {
                    alert('Hatalı şifre!');
                }
            } else {
                isAdmin = false;
                document.getElementById('adminPanel').classList.remove('active');
                document.querySelector('.admin-btn').textContent = '⚙️ Admin Panel';
                loadGames();
            }
        }

        // Add Game
        function addGame() {
            const name = document.getElementById('gameName').value;
            const image = document.getElementById('gameImage').value;
            const link = document.getElementById('downloadLink').value;
            const desc = document.getElementById('gameDesc').value;

            const game = {
                id: Date.now(),
                name,
                image,
                link,
                desc
            };

            games.push(game);
            localStorage.setItem('nexusGames', JSON.stringify(games));
            
            // Reset form
            document.getElementById('gameForm').reset();
            
            // Show success
            alert('✅ Oyun başarıyla eklendi!');
            loadGames();
        }

        // Delete Game
        function deleteGame(id) {
            if (confirm('Bu oyunu silmek istediğinize emin misiniz?')) {
                games = games.filter(game => game.id !== id);
                localStorage.setItem('nexusGames', JSON.stringify(games));
                loadGames();
            }
        }

        // Load Games
        function loadGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            if (games.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5); grid-column: 1/-1;">Henüz oyun eklenmemiş. Admin panelinden oyun ekleyebilirsiniz.</p>';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    ${isAdmin ? `<button class="delete-btn" onclick="deleteGame(${game.id})">×</button>` : ''}
                    <img src="${game.image}" alt="${game.name}" class="game-image" onerror="this.src='https://via.placeholder.com/400x300/1a1a2e/00f3ff?text=No+Image'">
                    <div class="game-info">
                        <h3 class="game-title">${game.name}</h3>
                        <p class="game-description">${game.desc}</p>
                    </div>
                `;
                card.onclick = (e) => {
                    if (!e.target.classList.contains('delete-btn')) {
                        openModal(game);
                    }
                };
                grid.appendChild(card);
            });
        }

        // Open Modal
        function openModal(game) {
            document.getElementById('modalTitle').textContent = game.name;
            document.getElementById('modalImage').src = game.image;
            document.getElementById('modalDesc').textContent = game.desc;
            document.getElementById('downloadBtn').onclick = () => {
                window.open(game.link, '_blank');
            };
            document.getElementById('gameModal').style.display = 'flex';
        }

        // Close Modal
        function closeModal() {
            document.getElementById('gameModal').style.display = 'none';
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Add some demo games if empty
        if (games.length === 0) {
            games = [
                {
                    id: 1,
                    name: "Cyberpunk 2077",
                    image: "https://image.api.playstation.com/vulcan/ap/rnd/202302/2321/3098482a63a4f090915bb3734d9a6e9b5d0f5b8f.png",
                    link: "https://example.com/download",
                    desc: "Geleceğin karanlık dünyasında geçen açık dünya aksiyon RPG oyunu."
                },
                {
                    id: 2,
                    name: "Elden Ring",
                    image: "https://image.api.playstation.com/vulcan/ap/rnd/202110/2000/phvVT0qZfcRms5qDAk0SI3CM.png",
                    link: "https://example.com/download",
                    desc: "FromSoftware'in epik fantezi dünyasında geçen zorlu aksiyon RPG'si."
                }
            ];
            localStorage.setItem('nexusGames', JSON.stringify(games));
            loadGames();
        }
    </script>
</body>
</html>
