<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y gamzezone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
  body {
    background: #0a0a1a;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* HEADER */
  header {
    position: relative;
    background: linear-gradient(135deg, #1a0033, #000033);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 2px solid #b026ff;
    box-shadow: 0 0 30px rgba(176, 38, 255, 0.5);
  }
  .char-left, .char-right {
    position: absolute;
    width: 180px;
    height: 200px;
    top: -20px;
    background-size: contain;
    background-repeat: no-repeat;
    filter: drop-shadow(0 0 15px #b026ff);
  }
  .char-left { left: 20px; background-image: url('https://cdn-icons-png.flaticon.com/512/3408/3408506.png'); }
  .char-right { right: 20px; background-image: url('https://cdn-icons-png.flaticon.com/512/3408/3408506.png'); transform: scaleX(-1); }
  .logo {
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 2;
  }
  .logo .y-letter {
    font-size: 80px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 10px #b026ff, 0 0 20px #b026ff, 0 0 40px #ff00ff;
  }
  .logo .site-name {
    font-size: 40px;
    font-weight: bold;
    background: linear-gradient(90deg, #b026ff, #00f0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  /* NAV */
  nav {
    background: #12122a;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    border-bottom: 1px solid #b026ff33;
  }
  nav a {
    color: #ccc;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
  }
  nav a:hover { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
  /* GAMES GRID */
  .games-section {
    padding: 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 25px;
  }
  .game-card {
    background: linear-gradient(145deg, #1a1a3a, #0f0f25);
    border: 1px solid #b026ff55;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
    position: relative;
  }
  .game-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(176, 38, 255, 0.4);
    border-color: #00f0ff;
  }
  .game-card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid #b026ff33;
  }
  .game-card h3 {
    font-size: 16px;
    margin-bottom: 10px;
    color: #fff;
  }
  .btn-download {
    background: linear-gradient(90deg, #b026ff, #00f0ff);
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .btn-download:hover { box-shadow: 0 0 20px #b026ff; }
  .btn-delete {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ff0040;
    border: none;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    display: none;
  }
  .admin-mode .btn-delete { display: block; }
  /* FOOTER */
  footer {
    background: #0a0a1a;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
    border-top: 1px solid #b026ff33;
  }
  .support {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #00f0ff;
  }
  .support svg { width: 30px; height: 30px; fill: #00f0ff; }
  .payment-form {
    background: #1a1a3a;
    padding: 20px;
    border-radius: 15px;
    border: 1px solid #b026ff;
    width: 280px;
  }
  .payment-form input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    background: #0a0a1a;
    border: 1px solid #b026ff55;
    border-radius: 8px;
    color: #fff;
  }
  .payment-form button {
    width: 100%;
    padding: 10px;
    background: linear-gradient(90deg, #b026ff, #00f0ff);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
  }
  .admin-login {
    background: transparent;
    border: 2px solid #b026ff;
    padding: 10px 25px;
    border-radius: 25px;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }
  .admin-login:hover { background: #b026ff; box-shadow: 0 0 20px #b026ff; }
  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 100;
  }
  .modal.active { display: flex; }
  .modal-content {
    background: #1a1a3a;
    padding: 30px;
    border-radius: 15px;
    border: 1px solid #b026ff;
    width: 350px;
  }
  .modal-content input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: #0a0a1a;
    border: 1px solid #b026ff55;
    border-radius: 8px;
    color: #fff;
  }
  .modal-content button {
    width: 100%;
    padding: 10px;
    background: linear-gradient(90deg, #b026ff, #00f0ff);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
  }
</style>
</head>
<body>

<header>
  <div class="char-left"></div>
  <div class="logo">
    <div class="y-letter">Y</div>
    <div class="site-name">gamzezone</div>
  </div>
  <div class="char-right"></div>
</header>

<nav>
  <a href="#">Ana Sayfa</a>
  <a href="#">Yeni Çıkanlar</a>
  <a href="#">En Çok İndirilenler</a>
  <a href="#">Kütüphanem</a>
</nav>

<section class="games-section">
  <div class="games-grid" id="gamesGrid">
    <!-- Oyunlar buraya eklenecek -->
  </div>
</section>

<footer>
  <div class="support">
    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    <div>
      <strong>Email Destek</strong><br>
      support@ygamzezone.com
    </div>
  </div>

  <div class="payment-form">
    <h4 style="margin-bottom:10px;color:#00f0ff;">💳 Kredi Kartı ile Ödeme</h4>
    <input type="text" placeholder="Kart Numarası">
    <div style="display:flex;gap:5px;">
      <input type="text" placeholder="AA/YY">
      <input type="text" placeholder="CVV">
    </div>
    <input type="text" placeholder="Kart Üzerindeki İsim">
    <button>Ödeme Yap</button>
  </div>

  <button class="admin-login" onclick="openAdminModal()">Admin Giriş</button>
</footer>

<!-- Admin Login Modal -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <h3 style="color:#00f0ff;margin-bottom:15px;"> Admin Giriş</h3>
    <input type="text" id="adminUser" placeholder="Kullanıcı Adı">
    <input type="password" id="adminPass" placeholder="Şifre">
    <button onclick="adminLogin()">Giriş Yap</button>
    <button onclick="closeAdminModal()" style="background:#ff0040;margin-top:5px;">Kapat</button>
  </div>
</div>

<!-- Oyun Ekleme Modal -->
<div class="modal" id="addGameModal">
  <div class="modal-content">
    <h3 style="color:#00f0ff;margin-bottom:15px;">🎮 Oyun Ekle</h3>
    <input type="text" id="gameName" placeholder="Oyun Adı">
    <input type="text" id="gameImg" placeholder="Oyun Resim URL">
    <button onclick="addGame()">Ekle</button>
    <button onclick="closeAddGameModal()" style="background:#ff0040;margin-top:5px;">Kapat</button>
  </div>
</div>

<script>
  // Varsayılan oyunlar
  let games = [
    { name: "Neon Shatter", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400" },
    { name: "Void Legion", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400" },
    { name: "Cyber Drift", img: "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=400" },
    { name: "Shadow Hunter", img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=400" }
  ];

  let isAdmin = false;
  const ADMIN_USER = "admin";
  const ADMIN_PASS = "gamzezone2026";

  function renderGames() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';
    games.forEach((game, i) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.innerHTML = `
        <button class="btn-delete" onclick="deleteGame(${i})"></button>
        <img src="${game.img}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/300x140/1a1a3a/b026ff?text=Resim+Yok'">
        <h3>${game.name}</h3>
        <button class="btn-download">Şimdi İndir</button>
      `;
      grid.appendChild(card);
    });
    if (isAdmin) document.body.classList.add('admin-mode');
    else document.body.classList.remove('admin-mode');
  }

  function openAdminModal() { document.getElementById('adminModal').classList.add('active'); }
  function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); }
  function closeAddGameModal() { document.getElementById('addGameModal').classList.remove('active'); }

  function adminLogin() {
    const u = document.getElementById('adminUser').value;
    const p = document.getElementById('adminPass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      isAdmin = true;
      closeAdminModal();
      renderGames();
      // Oyun ekleme butonu
      if (!document.getElementById('addGameBtn')) {
        const btn = document.createElement('button');
        btn.id = 'addGameBtn';
        btn.textContent = '+ Yeni Oyun Ekle';
        btn.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:15px 25px;background:linear-gradient(90deg,#b026ff,#00f0ff);border:none;border-radius:25px;color:#fff;font-weight:bold;cursor:pointer;z-index:50;box-shadow:0 0 20px #b026ff;';
        btn.onclick = () => document.getElementById('addGameModal').classList.add('active');
        document.body.appendChild(btn);
      }
      alert('✅ Admin girişi başarılı! Artık oyun ekleyip silebilirsin.');
    } else {
      alert('❌ Hatalı kullanıcı adı veya şifre!');
    }
  }

  function addGame() {
    const name = document.getElementById('gameName').value;
    const img = document.getElementById('gameImg').value;
    if (name && img) {
      games.push({ name, img });
      renderGames();
      closeAddGameModal();
      document.getElementById('gameName').value = '';
      document.getElementById('gameImg').value = '';
    } else {
      alert('Lütfen oyun adı ve resim URL girin!');
    }
  }

  function deleteGame(i) {
    if (confirm('Bu oyunu silmek istediğine emin misin?')) {
      games.splice(i, 1);
      renderGames();
    }
  }

  renderGames();
</script>

</body>
</html>
