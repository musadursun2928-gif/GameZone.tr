<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y GameZone - Premium Oyun İndirme Platformu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --neon-green: #00ff88;
            --dark-bg: #050505;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Particle Background */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #050505 0%, #0a0a1a 50%, #050505 100%);
        }

        /* Animated Background Glow */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
            animation: glowMove 20s ease-in-out infinite;
        }

        .bg-glow-1 {
            background: var(--neon-blue);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .bg-glow-2 {
            background: var(--neon-purple);
            bottom: -200px;
            right: -200px;
            animation-delay: 5s;
        }

        .bg-glow-3 {
            background: var(--neon-pink);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 10s;
        }

        @keyframes glowMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.2); }
            66% { transform: translate(-30px, 30px) scale(0.8); }
        }

        /* Header & Logo */
        header {
            text-align: center;
            padding: 50px 20px;
            position: relative;
            z-index: 100;
        }

        .logo-container {
            display: inline-block;
            position: relative;
        }

        .logo {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 15px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-green));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: logoGlow 5s ease infinite, gradientShift 8s ease infinite;
            position: relative;
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.5);
        }

        .logo::before {
            content: 'Y GameZone';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: blur(30px);
            opacity: 0.6;
            z-index: -1;
            animation: logoGlow 3s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from { filter: drop-shadow(0 0 30px rgba(0, 243, 255, 0.8)); }
            to { filter: drop-shadow(0 0 60px rgba(188, 19, 254, 0.8)); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .tagline {
            margin-top: 15px;
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 8px;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Character Containers */
        .character-container {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 400px;
            height: 800px;
            z-index: 1;
            opacity: 0.95;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s;
        }

        .character-left {
            left: 0;
            background: radial-gradient(ellipse at center, rgba(0, 243, 255, 0.2) 0%, transparent 70%);
        }

        .character-right {
            right: 0;
            background: radial-gradient(ellipse at center, rgba(188, 19, 254, 0.2) 0%, transparent 70%);
        }

        .character-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 40px currentColor) brightness(1.2) contrast(1.1);
            animation: characterFloat 8s ease-in-out infinite, characterPulse 4s ease-in-out infinite alternate;
        }

        .character-left .character-img {
            color: var(--neon-blue);
            animation-delay: 0s;
        }

        .character-right .character-img {
            color: var(--neon-purple);
            animation-delay: 2s;
        }

        @keyframes characterFloat {
            0%, 100% { transform: translateY(0px) rotate(-3deg) scale(1); }
            25% { transform: translateY(-30px) rotate(3deg) scale(1.05); }
            50% { transform: translateY(0px) rotate(-3deg) scale(1); }
            75% { transform: translateY(30px) rotate(3deg) scale(0.95); }
        }

        @keyframes characterPulse {
            from { 
                filter: drop-shadow(0 0 30px var(--neon-blue)) brightness(1.2);
            }
            to { 
                filter: drop-shadow(0 0 80px var(--neon-purple)) brightness(1.4);
            }
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* Admin Button */
        .admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 243, 255, 0.1);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 1000;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .admin-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
            transform: translateY(-2px);
        }

        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 40px auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 25px;
            background: var(--glass-bg);
            border: 2px solid rgba(0, 243, 255, 0.3);
            border-radius: 50px;
            color: #fff;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .search-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--neon-blue);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            transition: all 0.3s;
        }

        .search-btn:hover {
            background: var(--neon-purple);
            color: #fff;
        }

        /* Games Grid */
        .games-section {
            margin-top: 60px;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 50px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
            border-radius: 2px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 35px;
            padding: 20px;
        }

        .game-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.8s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--neon-blue);
            box-shadow: 0 20px 60px rgba(0, 243, 255, 0.4);
        }

        .game-image-container {
            width: 100%;
            height: 140px;
            overflow: hidden;
            border-bottom: 3px solid var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(188, 19, 254, 0.1));
            position: relative;
        }

        .game-image {
            width: 70%;
            height: 70%;
            object-fit: contain;
            transition: all 0.4s;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.5));
        }

        .game-card:hover .game-image {
            transform: scale(1.2) rotate(5deg);
            filter: drop-shadow(0 10px 30px rgba(0, 243, 255, 0.5));
        }

        .game-info {
            padding: 25px;
        }

        .game-title {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: #fff;
            font-weight: 700;
        }

        .game-description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid var(--neon-blue);
            border-radius: 30px;
            padding: 50px;
            max-width: 700px;
            width: 90%;
            position: relative;
            box-shadow: 0 0 80px rgba(0, 243, 255, 0.4);
            animation: modalSlideIn 0.4s ease;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.7) translateY(-50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.5rem;
            cursor: pointer;
            color: var(--neon-pink);
            transition: all 0.3s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-modal:hover {
            transform: rotate(90deg) scale(1.1);
            color: #fff;
            background: rgba(255, 0, 255, 0.2);
        }

        .modal-title {
            font-size: 2.5rem;
            margin-bottom: 25px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-image {
            width: 100%;
            height: 350px;
            object-fit: contain;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 3px solid var(--neon-purple);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0, 243, 255, 0.6);
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            background: var(--glass-bg);
            border: 3px solid var(--neon-pink);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 50px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.2);
        }

        .admin-panel.active {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .submit-btn {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            color: #fff;
            border: none;
            padding: 18px 50px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 0, 255, 0.5);
        }

        /* Support Section */
        .support-section {
            margin-top: 80px;
            padding: 50px;
            background: var(--glass-bg);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
        }

        .support-title {
            font-size: 2.5rem;
            margin-bottom: 25px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .support-email {
            font-size: 1.6rem;
            color: var(--neon-blue);
            text-decoration: none;
            display: inline-block;
            padding: 18px 40px;
            border: 3px solid var(--neon-blue);
            border-radius: 50px;
            transition: all 0.3s;
            margin-top: 15px;
            font-weight: bold;
        }

        .support-email:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
            transform: translateY(-3px);
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin: 60px 0;
            padding: 40px;
            background: var(--glass-bg);
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
            padding: 20px;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .character-container {
                display: none;
            }
            
            .logo {
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
                letter-spacing: 8px;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
            
            .section-title {
                font-size: 2rem;
            }
        }

        /* Loading Animation */
        .loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3000;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 243, 255, 0.3);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 0, 0, 0.9);
            color: #fff;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: #ff0000;
            transform: scale(1.2) rotate(90deg);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--neon-blue), var(--neon-purple));
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(var(--neon-purple), var(--neon-pink));
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- Character Images - Left Side (Yasuo - League of Legends) -->
    <div class="character-container character-left">
        <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Yasuo_0.jpg" alt="Yasuo" class="character-img" onerror="this.style.display='none'">
    </div>

    <!-- Character Images - Right Side (Jett - Valorant) -->
    <div class="character-container character-right">
        <img src="https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt5f3d9f9f9f9f9f9f/605e49e3a6a6e728c6c6d5e5/VALORANT_Jett_Art.png" alt="Jett" class="character-img" onerror="this.style.display='none'">
    </div>

    <!-- Admin Button -->
    <button class="admin-btn" onclick="toggleAdmin()">⚙️ ADMIN PANEL</button>

    <!-- Header -->
    <header>
        <div class="logo-container">
            <h1 class="logo">Y GameZone</h1>
            <p class="tagline">PREMIUM OYUN İNDİRME PLATFORMU</p>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Admin Panel -->
        <div class="admin-panel" id="adminPanel">
            <h2 style="color: var(--neon-pink); margin-bottom: 30px; text-align: center; font-size: 2rem;">🎮 YENİ OYUN EKLE</h2>
            <form id="gameForm">
                <div class="form-group">
                    <label>Oyun Adı</label>
                    <input type="text" id="gameName" required placeholder="Örn: Cyberpunk 2077">
                </div>
                <div class="form-group">
                    <label>Oyun Resmi URL</label>
                    <input type="url" id="gameImage" required placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>İndirme Linki</label>
                    <input type="url" id="downloadLink" required placeholder="https://example.com/download">
                </div>
                <div class="form-group">
                    <label>Açıklama</label>
                    <textarea id="gameDesc" rows="3" required placeholder="Oyun hakkında kısa açıklama..."></textarea>
                </div>
                <button type="submit" class="submit-btn">🚀 OYUNU EKLE</button>
            </form>
        </div>

        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-item">
                <div class="stat-number" id="totalGames">0</div>
                <div class="stat-label">TOPLAM OYUN</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">50K+</div>
                <div class="stat-label">İNDİRME</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">24/7</div>
                <div class="stat-label">DESTEK</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">%100</div>
                <div class="stat-label">GÜVENLİ</div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Oyun ara..." onkeyup="searchGames()">
            <button class="search-btn">🔍</button>
        </div>

        <!-- Games Section -->
        <section class="games-section">
            <h2 class="section-title">🎯 POPÜLER OYUNLAR</h2>
            <div class="games-grid" id="gamesGrid">
                <!-- Games will be loaded here -->
            </div>
        </section>

        <!-- Support Section -->
        <section class="support-section">
            <h2 class="support-title">📧 DESTEK HATTI</h2>
            <p style="color: rgba(255,255,255,0.8); margin-bottom: 20px; font-size: 1.1rem;">Herhangi bir sorun mu yaşadınız? Bize ulaşın!</p>
            <a href="mailto:destek@ygamezone.com" class="support-email">destek@ygamezone.com</a>
        </section>
    </div>

    <!-- Game Detail Modal -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <img src="" alt="" class="modal-image" id="modalImage">
            <p id="modalDesc" style="color: rgba(255,255,255,0.9); line-height: 1.8; font-size: 1.1rem;"></p>
            <button class="download-btn" id="downloadBtn">
                ⬇️ HEMEN İNDİR
            </button>
        </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Particles.js Library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // Initialize Particles
        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: ['#00f3ff', '#bc13fe', '#ff00ff'] },
                shape: { type: 'circle' },
                opacity: { value: 0.5, random: true },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: '#00f3ff',
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 2,
                    direction: 'none',
                    random: true,
                    straight: false,
                    out_mode: 'out',
                    bounce: false
                }
            },
            interactivity: {
                detect_on: 'canvas',
                events: {
                    onhover: { enable: true, mode: 'grab' },
                    onclick: { enable: true, mode: 'push' },
                    resize: true
                },
                modes: {
                    grab: { distance: 140, line_linked: { opacity: 0.5 } },
                    push: { particles_nb: 4 }
                }
            },
            retina_detect: true
        });

        // Games data storage
        let games = JSON.parse(localStorage.getItem('yGameZoneGames')) || [];

        // Admin password
        const ADMIN_PASSWORD = 'admin123';
        let isAdmin = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadGames();
            updateStats();
            
            // Form submit
            document.getElementById('gameForm').addEventListener('submit', (e) => {
                e.preventDefault();
                addGame();
            });
        });

        // Toggle Admin Panel
        function toggleAdmin() {
            if (!isAdmin) {
                const password = prompt('🔐 Admin şifresini girin:');
                if (password === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById('adminPanel').classList.add('active');
                    document.querySelector('.admin-btn').textContent = '❌ ÇIKIŞ YAP';
                    document.querySelector('.admin-btn').style.background = 'rgba(255, 0, 0, 0.2)';
                    document.querySelector('.admin-btn').style.borderColor = '#ff0000';
                    document.querySelector('.admin-btn').style.color = '#ff0000';
                    loadGames();
                    scrollToAdmin();
                } else if (password !== null) {
                    alert('❌ Hatalı şifre!');
                }
            } else {
                isAdmin = false;
                document.getElementById('adminPanel').classList.remove('active');
                document.querySelector('.admin-btn').textContent = '⚙️ ADMIN PANEL';
                document.querySelector('.admin-btn').style.background = 'rgba(0, 243, 255, 0.1)';
                document.querySelector('.admin-btn').style.borderColor = 'var(--neon-blue)';
                document.querySelector('.admin-btn').style.color = 'var(--neon-blue)';
                loadGames();
            }
        }

        function scrollToAdmin() {
            document.getElementById('adminPanel').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Add Game
        function addGame() {
            const name = document.getElementById('gameName').value;
            const image = document.getElementById('gameImage').value;
            const link = document.getElementById('downloadLink').value;
            const desc = document.getElementById('gameDesc').value;

            const game = {
                id: Date.now(),
                name,
                image,
                link,
                desc,
                date: new Date().toLocaleDateString('tr-TR')
            };

            games.push(game);
            localStorage.setItem('yGameZoneGames', JSON.stringify(games));
            
            document.getElementById('gameForm').reset();
            
            // Show success message
            showNotification('✅ Oyun başarıyla eklendi!', 'success');
            loadGames();
            updateStats();
        }

        // Delete Game
        function deleteGame(id, event) {
            event.stopPropagation();
            if (confirm('⚠️ Bu oyunu silmek istediğinize emin misiniz?')) {
                games = games.filter(game => game.id !== id);
                localStorage.setItem('yGameZoneGames', JSON.stringify(games));
                showNotification('🗑️ Oyun silindi!', 'info');
                loadGames();
                updateStats();
            }
        }

        // Search Games
        function searchGames() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.game-card');
            
            cards.forEach(card => {
                const title = card.querySelector('.game-title').textContent.toLowerCase();
                const desc = card.querySelector('.game-description').textContent.toLowerCase();
                
                if (title.includes(searchTerm) || desc.includes(searchTerm)) {
                    card.style.display = 'block';
                    card.style.animation = 'fadeInUp 0.5s ease';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Load Games
        function loadGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            if (games.length === 0) {
                grid.innerHTML = `
                    <div style="text-align: center; color: rgba(255,255,255,0.5); grid-column: 1/-1; padding: 60px; font-size: 1.2rem;">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🎮</div>
                        <p>Henüz oyun eklenmemiş.</p>
                        <p style="margin-top: 10px;">Admin panelinden oyun ekleyebilirsiniz.</p>
                    </div>
                `;
                return;
            }

            games.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.style.animation = `fadeInUp 0.5s ease ${index * 0.1}s both`;
                card.innerHTML = `
                    ${isAdmin ? `<button class="delete-btn" onclick="deleteGame(${game.id}, event)" title="Sil">×</button>` : ''}
                    <div class="game-image-container">
                        <img src="${game.image}" alt="${game.name}" class="game-image" 
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22150%22%3E%3Crect fill=%22%231a1a2e%22 width=%22200%22 height=%22150%22/%3E%3Ctext fill=%22%2300f3ff%22 font-size=%2220%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3EOyun%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="game-info">
                        <h3 class="game-title">${game.name}</h3>
                        <p class="game-description">${game.desc}</p>
                    </div>
                `;
                card.onclick = (e) => {
                    if (!e.target.classList.contains('delete-btn')) {
                        openModal(game);
                    }
                };
                grid.appendChild(card);
            });
        }

        // Update Stats
        function updateStats() {
            const totalGamesEl = document.getElementById('totalGames');
            if (totalGamesEl) {
                animateNumber(totalGamesEl, games.length);
            }
        }

        // Animate Number
        function animateNumber(element, target) {
            let current = 0;
            const increment = target / 30;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    element.textContent = target;
                    clearInterval(timer);
                } else {
                    element.textContent = Math.floor(current);
                }
            }, 50);
        }

        // Open Modal
        function openModal(game) {
            document.getElementById('modalTitle').textContent = game.name;
            document.getElementById('modalImage').src = game.image;
            document.getElementById('modalDesc').textContent = game.desc;
            document.getElementById('downloadBtn').onclick = () => {
                window.open(game.link, '_blank');
                showNotification('⬇️ İndirme başlatıldı!', 'success');
            };
            document.getElementById('gameModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // Close Modal
        function closeModal() {
            document.getElementById('gameModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Notification System
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: ${type === 'success' ? 'linear-gradient(45deg, #00f3ff, #00ff88)' : 'linear-gradient(45deg, #bc13fe, #ff00ff)'};
                color: #000;
                padding: 20px 30px;
                border-radius: 15px;
                font-weight: bold;
                font-size: 1.1rem;
                z-index: 5000;
                animation: slideInRight 0.5s ease;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.5s ease';
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }

        // Add CSS for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(400px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOutRight {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(400px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // Add some demo games if empty
        if (games.length === 0) {
            games = [
                {
                    id: 1,
                    name: "Cyberpunk 2077",
                    image: "https://image.api.playstation.com/vulcan/ap/rnd/202302/2321/3098482a63a4f090915bb3734d9a6e9b5d0f5b8f.png",
                    link: "https://example.com/download",
                    desc: "Geleceğin karanlık dünyasında geçen açık dünya aksiyon RPG oyunu. Night City'de hayatta kalma mücadelesi."
                },
                {
                    id: 2,
                    name: "Elden Ring",
                    image: "https://image.api.playstation.com/vulcan/ap/rnd/202110/2000/phvVT0qZfcRms5qDAk0SI3CM.png",
                    link: "https://example.com/download",
                    desc: "FromSoftware'in epik fantezi dünyasında geçen zorlu aksiyon RPG'si. Lands Between'de macera sizi bekliyor."
                },
                {
                    id: 3,
                    name: "Red Dead Redemption 2",
                    image: "https://image.api.playstation.com/vulcan/img/rnd/202010/2217/p3pYq0QxntZQREXRVdAzmn1w.png",
                    link: "https://example.com/download",
                    desc: "Vahşi Batı'da geçen epik macera oyunu. Arthur Morgan'ın hikayesine tanık olun."
                }
            ];
            localStorage.setItem('yGameZoneGames', JSON.stringify(games));
            loadGames();
            updateStats();
        }
    </script>
</body>
</html>
